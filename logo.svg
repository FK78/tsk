<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1a1a2e" />
  
  <!-- Checkbox outline -->
  <rect x="45" y="55" width="50" height="50" rx="8" ry="8" fill="none" stroke="#e94560" stroke-width="5" />
  
  <!-- Checkmark -->
  <polyline points="55,82 70,97 90,65" fill="none" stroke="#e94560" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Terminal cursor lines -->
  <line x1="110" y1="68" x2="155" y2="68" stroke="#0f3460" stroke-width="5" stroke-linecap="round" />
  <line x1="110" y1="82" x2="145" y2="82" stroke="#0f3460" stroke-width="5" stroke-linecap="round" />
  <line x1="110" y1="96" x2="150" y2="96" stroke="#0f3460" stroke-width="5" stroke-linecap="round" />
  
  <!-- "tsk" text -->
  <text x="100" y="150" font-family="monospace" font-size="36" font-weight="bold" fill="#e94560" text-anchor="middle">tsk</text>
</svg>
